name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # 创建 Release 并上传二进制

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: tsbot
            asset: tsbot-linux-x86_64
          - os: windows-latest
            bin: tsbot.exe
            asset: tsbot-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libopus-dev autoconf automake libtool

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p tsbot

      - name: Package binary
        shell: bash
        run: cp "target/release/${{ matrix.bin }}" "${{ matrix.asset }}"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            config.example.toml
          generate_release_notes: true
